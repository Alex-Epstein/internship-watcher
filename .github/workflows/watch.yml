name: Internship Watcher

on:
  schedule:
    # Every 30 minutes (UTC). GitHub may delay scheduled runs by a few minutes.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # adds a "Run workflow" button so you can test on demand

permissions:
  contents: write          # allows committing the updated seen_jobs.json

concurrency:
  group: watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python watcher.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          if git diff --quiet --cached; then
            echo "No state changes to push."
            exit 0
          fi
          git commit -m "Update seen jobs [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "State pushed."
              exit 0
            fi
            echo "Push attempt $i failed (remote moved); retrying..."
            sleep 5
          done
          echo "Could not push state this run; it will retry next run."
